name: Deploy Firebase (Functions + Rules)

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase/database.rules.json"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase.yml"
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to signal-provider-pro
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Lint functions
        run: npm --prefix functions run lint

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIGNAL_PROVIDER_PRO }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Strip _comment keys from rules file (Firebase rejects unknown keys at some path levels)
        run: |
          node -e '
            const fs = require("fs");
            const path = "firebase/database.rules.json";
            const strip = (o) => {
              if (Array.isArray(o)) return o.map(strip);
              if (o && typeof o === "object") {
                const out = {};
                for (const [k, v] of Object.entries(o)) if (k !== "_comment") out[k] = strip(v);
                return out;
              }
              return o;
            };
            const json = JSON.parse(fs.readFileSync(path, "utf8"));
            fs.writeFileSync(path, JSON.stringify(strip(json), null, 2));
            console.log("rules file sanitized for deploy");
          '

      - name: Deploy rules + functions
        run: firebase deploy --only "database,functions" --project signal-provider-pro --non-interactive --force
