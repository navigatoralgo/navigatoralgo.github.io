<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Sign In — Navigator Algo</title>
<meta name="description" content="Sign in to your Navigator Algo signal provider dashboard.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://navigatoralgo.com/signin.html">
<meta property="og:title" content="Sign In — Navigator Algo">
<meta property="og:description" content="Sign in to your Navigator Algo signal provider dashboard.">
<meta property="og:image" content="https://navigatoralgo.com/logo.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Sign In — Navigator Algo">
<meta name="twitter:description" content="Sign in to your Navigator Algo signal provider dashboard.">
<meta name="twitter:image" content="https://navigatoralgo.com/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/shared.css">
<style>
.signin-shell {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 172px 24px 80px;
}
.signin-panel {
  background: var(--panel);
  border: 1px solid rgba(36,48,64,0.72);
  border-radius: 28px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.28), 0 0 0 1px rgba(0,212,200,0.04) inset;
  padding: 40px 36px;
}
.signin-title {
  font-family: var(--font-head);
  font-size: 28px; font-weight: 800;
  color: var(--white);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}
.signin-subtitle {
  font-family: var(--font-ui);
  font-size: 11px; letter-spacing: 0.12em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 32px;
}
.divider {
  display: flex; align-items: center; gap: 14px;
  margin: 28px 0;
  font-family: var(--font-ui);
  font-size: 10px; letter-spacing: 0.14em;
  color: var(--muted); text-transform: uppercase;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(36,48,64,0.72);
}
.google-btn {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(36,48,64,0.72);
  color: var(--white);
  font-family: var(--font-ui);
  font-size: 12px; letter-spacing: 0.06em;
  padding: 14px 18px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}
.google-btn:hover {
  border-color: rgba(0,212,200,0.3);
  background: rgba(0,212,200,0.04);
  transform: translateY(-1px);
}
.google-btn svg { width: 18px; height: 18px; }
.signin-footer {
  margin-top: 28px;
  font-family: var(--font-ui);
  font-size: 10px; letter-spacing: 0.08em;
  color: var(--muted); text-transform: uppercase;
  text-align: center;
}
.signin-footer a { color: var(--teal); text-decoration: none; }
.signin-footer a:hover { color: var(--gold); }
.signin-note {
  margin-top: 16px;
  padding: 14px 16px;
  background: rgba(0,212,200,0.04);
  border: 1px solid rgba(0,212,200,0.12);
  border-radius: 12px;
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text);
  line-height: 1.6;
}
.hidden { display: none !important; }
@media (max-width: 768px) {
  .signin-shell { padding: 124px 14px 56px; }
  .signin-panel { padding: 28px 20px; border-radius: 20px; }
  .signin-title { font-size: 24px; }
  .signin-subtitle { margin-bottom: 24px; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>

<nav id="nav">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="Navigator Algo" class="nav-logo-mark" width="340" height="227">
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="signal-copier.html">Signal Copier</a></li>
    <li id="nav-auth-slot"><a href="signin.html" class="current nav-btn-ghost">Sign in</a></li>
    <li><a href="https://www.mql5.com/en/users/janithasandu/seller" target="_blank" class="nav-btn">MQL5 Store →</a></li>
  </ul>
</nav>

<div class="status-bar">
  <div class="status-item"><span class="status-dot"></span> <span class="val-teal">PROVIDER DASHBOARD</span></div>
  <div class="status-item">SECURE LOGIN</div>
  <div class="status-item">FIREBASE AUTH</div>
  <div class="status-item">NO PASSWORDS</div>
</div>

<main class="signin-shell">
  <div class="signin-panel">
    <div class="signin-title">Sign in</div>
    <div class="signin-subtitle">Navigator Algo · Provider Dashboard</div>

    <!-- EMAIL FORM (shown by default) -->
    <form id="emailForm" class="form-group" novalidate>
      <label class="form-label" for="emailInput">Your email</label>
      <input
        id="emailInput"
        type="email"
        class="form-input"
        placeholder="you@example.com"
        autocomplete="email"
        required>
      <div id="emailError" class="form-error"></div>
      <div id="emailSuccess" class="form-success hidden"></div>
      <button type="submit" id="sendLinkBtn" class="btn btn-primary" style="margin-top:18px;width:100%;justify-content:center;">
        Send sign-in link
      </button>
    </form>

    <div class="divider">or</div>

    <button id="googleBtn" class="google-btn">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09 0-.72.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12c0 1.78.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <!-- SIGNING IN STATE -->
    <div id="signingIn" class="signin-note hidden">
      Signing you in…
    </div>

    <div class="signin-footer">
      No password needed · <a href="index.html">← Back to home</a>
    </div>
  </div>
</main>

<script type="module">
  import {
    watchAuth, sendMagicLink, completeEmailLinkSignIn,
    signInWithGoogle, completeGoogleRedirect
  } from "./assets/app.js";

  const emailForm    = document.getElementById("emailForm");
  const emailInput   = document.getElementById("emailInput");
  const emailError   = document.getElementById("emailError");
  const emailSuccess = document.getElementById("emailSuccess");
  const sendLinkBtn  = document.getElementById("sendLinkBtn");
  const googleBtn    = document.getElementById("googleBtn");
  const signingIn    = document.getElementById("signingIn");

  function setError(msg) {
    emailError.textContent = msg || "";
    emailSuccess.classList.add("hidden");
  }
  function setSuccess(msg) {
    emailSuccess.textContent = msg || "";
    emailSuccess.classList.remove("hidden");
    emailError.textContent = "";
  }

  // If we arrived via a magic-link URL, finish the sign-in.
  (async () => {
    try {
      const user = await completeEmailLinkSignIn();
      if (user) {
        window.location.replace("dashboard.html");
      }
    } catch (e) {
      setError(e.message || "Could not complete sign-in. Please try again.");
    }
  })();

  // If we arrived back from a Google redirect flow, finish the sign-in.
  (async () => {
    try {
      const user = await completeGoogleRedirect();
      if (user) {
        window.location.replace("dashboard.html");
      }
    } catch (e) {
      setError(friendlyGoogleError(e));
    }
  })();

  // If the user is already signed in, skip straight to the dashboard.
  watchAuth(
    (user) => {
      // Don't redirect during the magic-link completion flow above —
      // completeEmailLinkSignIn handles its own navigation.
      if (window.location.href.includes("apiKey=") && window.location.href.includes("mode=signIn")) return;
      window.location.replace("dashboard.html");
    },
    () => { /* not signed in, stay on this page */ }
  );

  emailForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    setError("");
    const email = emailInput.value.trim();
    if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
      setError("Please enter a valid email address.");
      return;
    }
    sendLinkBtn.disabled = true;
    sendLinkBtn.textContent = "Sending…";
    try {
      await sendMagicLink(email);
      setSuccess("Check your inbox — we just sent a one-time sign-in link to " + email + ".");
      sendLinkBtn.textContent = "Link sent";
    } catch (err) {
      console.error(err);
      setError(err.message || "Could not send the sign-in link. Please try again.");
      sendLinkBtn.disabled = false;
      sendLinkBtn.textContent = "Send sign-in link";
    }
  });

  function friendlyGoogleError(err) {
    if (!err) return "Google sign-in failed. Please try again.";
    const code = err.code || "";
    if (code === "auth/popup-closed-by-user")       return "You closed the Google sign-in window before finishing. Please try again.";
    if (code === "auth/cancelled-popup-request")    return "Another sign-in window is already open. Please close it and try again.";
    if (code === "auth/popup-blocked")              return "Your browser blocked the Google pop-up. Please allow pop-ups for navigatoralgo.com and try again.";
    if (code === "auth/unauthorized-domain")        return "This domain is not authorized for Google sign-in. Contact support.";
    if (code === "auth/operation-not-allowed")      return "Google sign-in isn't enabled on this project yet. Contact support.";
    if (code === "auth/account-exists-with-different-credential")
      return "An account with this email already exists with a different sign-in method. Please use the magic-link option above.";
    if (code === "auth/network-request-failed")     return "Network error. Check your connection and try again.";
    return (err.message || "Google sign-in failed.") + (code ? " (" + code + ")" : "");
  }

  googleBtn.addEventListener("click", async () => {
    setError("");
    try {
      googleBtn.disabled = true;
      signingIn.classList.remove("hidden");
      signingIn.textContent = "Opening Google sign-in…";
      const user = await signInWithGoogle();
      // Popup succeeded → watchAuth will redirect.
      // Redirect fallback → page will navigate; nothing else to do here.
      if (!user) {
        signingIn.textContent = "Redirecting to Google…";
      }
    } catch (err) {
      console.error("[Navigator Algo] Google sign-in failed:", err?.code, err);
      setError(friendlyGoogleError(err));
      googleBtn.disabled = false;
      signingIn.classList.add("hidden");
    }
  });
</script>

<script type="module" src="assets/nav-auth.js"></script>
</body>
</html>
